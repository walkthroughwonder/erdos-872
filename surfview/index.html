<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SurfView — real-time surf spot simulator</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
  <link rel="stylesheet" href="vendor/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="brand">
        <h1><span class="wave">Surf</span>View</h1>
        <p>Pick a spot → see the ocean there, right now.</p>
      </div>
      <div id="search-wrap">
        <input id="search" type="search" placeholder="Search spots — name, country, break type…" autocomplete="off">
      </div>
      <ul id="spot-list"></ul>
    </aside>

    <main id="map-wrap">
      <div id="map"></div>
      <section id="conditions" class="hidden"></section>
    </main>
  </div>

  <div id="sim-overlay" class="hidden">
    <canvas id="sim-canvas"></canvas>
    <div id="sim-hud"></div>
  </div>

  <script src="vendor/leaflet.js"></script>
  <script src="js/spots.js"></script>
  <script src="js/ocean.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
